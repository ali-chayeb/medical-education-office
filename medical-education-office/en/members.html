<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Members of the Medical Education Office - Aleppo University Hospital">
  <title>Members - Medical Education Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/en/" class="logo-link">
        <img data-setting="logo" src="/assets/images/placeholder-logo.png" alt="Office Logo" style="display:none;">
        <span class="site-title" data-setting="site-title">Medical Education Office</span>
      </a>
      <button class="mobile-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav">
        <ul>
          <li><a href="/en/">Home</a></li>
          <li><a href="/en/about.html">About</a></li>
          <li><a href="/en/members.html">Members</a></li>
          <li><a href="/en/activities.html">Activities</a></li>
          <li><a href="/en/contact.html">Contact</a></li>
        </ul>
        <div class="lang-switch">
          <a href="/ar/">AR</a>
          <a href="/en/" class="active">EN</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2>Our Members</h2>
          <p>Meet the team at the Medical Education Office</p>
        </div>
        <div id="members-container">
          <div class="members-grid">
            <div class="skeleton" style="height:200px;"></div>
            <div class="skeleton" style="height:200px;"></div>
            <div class="skeleton" style="height:200px;"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="export-section">
      <div class="container">
        <div class="export-section">
          <h3>Export Data</h3>
          <p>Download a backup of the site data</p>
          <div class="btn-group">
            <button id="export-members" class="btn btn-primary">Download Members (CSV)</button>
            <button id="export-activities" class="btn btn-accent">Download Activities (CSV)</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-social">
        <a data-setting="facebook" href="#" aria-label="Facebook">FB</a>
        <a data-setting="whatsapp" href="#" aria-label="WhatsApp">WA</a>
        <a data-setting="telegram" href="#" aria-label="Telegram">TG</a>
        <a data-setting="email" href="#" aria-label="Email">@</a>
      </div>
      <p data-setting="site-title">Medical Education Office</p>
      <p data-setting="address"></p>
    </div>
  </footer>

  <script src="/assets/js/main.js"></script>
</body>
</html>
